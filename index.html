/* ─── SAMMENLIGNING TAB ─── */
function SammenligningTab({boliger,snapshots,husData}){
  const pot=boliger.filter(b=>b.status==='potensiell');
  const [selected,setSelected]=useState([]);
  const [mode,setMode]=useState('overview'); // overview | detail

  // Scores
  function techScore(b){
    const cl=b.checklist||{};
    let s=100;
    CATS.find(c=>c.id==='teknisk')?.items.forEach(i=>{if(cl[i.id]==='bad')s-=12;else if(cl[i.id]==='warn')s-=5;});
    (b.tgFeil||[]).forEach(t=>{s-=t.grad==='TG3'?18:t.grad==='TG2'?7:2;});
    return Math.max(0,s);
  }

  function checklistScore(b){
    const cl=b.checklist||{};
    const ok=Object.values(cl).filter(v=>v==='ok').length;
    const bad=Object.values(cl).filter(v=>v==='bad').length;
    const warn=Object.values(cl).filter(v=>v==='warn').length;
    const total=ok+bad+warn;
    return total>0?Math.round((ok-bad*1.5-warn*0.5)/total*100):null;
  }

  function inckSaving(b){
    return (b.inkl?.internett?500:0)+(b.inkl?.fyring?1200:0)+(b.inkl?.varmtvann?400:0);
  }

  function tgEst(b){return (b.tgFeil||[]).reduce((s,t)=>s+(t.estimertKostnad||0),0);}

  function effectiveMonthlyCost(b,snap){
    if(!snap)return null;
    return snap.mLaan+(b.felleskost||0)-inckSaving(b);
  }

  const ranked=[...pot].map(b=>{
    const snap=snapshots?.find(s=>s.boligId===b.id);
    const ts=techScore(b);
    const tg=tgEst(b);
    const inkSave=inckSaving(b);
    const effFk=Math.max(0,(b.felleskost||0)-inkSave);
    const emc=effectiveMonthlyCost(b,snap);
    // Score: lower total cost + higher tech + stars
    const costScore=(b.totalpris||b.pris||0)+tg+(effFk*12*5);
    const qualScore=ts*10000+(b.stjerner||0)*50000;
    return {...b,_snap:snap,_ts:ts,_tg:tg,_inkSave:inkSave,_effFk:effFk,_emc:emc,_rank:costScore-qualScore};
  }).sort((a,b)=>a._rank-b._rank);

  const shown=selected.length>0?ranked.filter(b=>selected.includes(b.id)):ranked;

  // Overview mode
  if(mode==='overview')return <div>
    <div style={{marginBottom:18}}>
      <div style={{fontSize:20,fontWeight:700,letterSpacing:'-.02em'}}>Sammenligning</div>
      <div style={{fontSize:13,color:'var(--txt3)',marginTop:3}}>{pot.length} potensielle bolig{pot.length!==1?'er':''}</div>
    </div>
    {pot.length===0&&<div className="empty-s"><div className="icon" style={{fontSize:36}}>⚖</div><div className="title">Ingen potensielle boliger</div><div className="sub">Merk boliger som Potensiell i Visning-fanen</div></div>}
    {pot.length>0&&<>
      {/* Filter */}
      {pot.length>2&&<div className="card" style={{marginBottom:14}}>
        <div className="card-title">Velg boliger å sammenligne</div>
        {pot.map(b=>(
          <button key={b.id} onClick={()=>setSelected(p=>p.includes(b.id)?p.filter(x=>x!==b.id):[...p,b.id])}
            style={{display:'block',width:'100%',marginBottom:7,textAlign:'left',padding:'10px 14px',border:'1px solid '+(selected.includes(b.id)?'var(--accent)':'var(--br2)'),borderRadius:'var(--r)',background:selected.includes(b.id)?'var(--bbg)':'var(--bg2)',cursor:'pointer',font:'inherit',transition:'all .12s',color:selected.includes(b.id)?'var(--bdk)':'var(--txt)'}}>
            <div style={{fontWeight:600,fontSize:14}}>{b.adresse}</div>
            <div style={{fontSize:12,color:selected.includes(b.id)?'var(--bdk)':'var(--txt3)',marginTop:1}}>{fmtK(b.totalpris||b.pris)} kr total</div>
          </button>
        ))}
        {selected.length>0&&<button onClick={()=>setSelected([])} style={{fontSize:12,color:'var(--txt3)',padding:'4px 8px',border:'none',background:'transparent',cursor:'pointer',font:'inherit'}}>Vis alle</button>}
      </div>}

      {/* Ranking overview */}
      <div className="card">
        <div className="card-title">Rangering</div>
        <div style={{fontSize:12,color:'var(--txt3)',marginBottom:12,lineHeight:1.5}}>Basert på totalpris, TG-feil, effektive felleskostnader og din vurdering</div>
        {shown.map((b,i)=>{
          const medal=i===0?'#':i===1?'##':'###';
          const medalCol=i===0?'#d97706':i===1?'#6b7280':'#9ca3af';
          const medalLabel=i===0?'Topp':'#'+(i+1);
          return <div key={b.id} style={{padding:'12px 0',borderBottom:'1px solid var(--br)',display:'flex',gap:12,alignItems:'flex-start'}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:i===0?'#fef3c7':i===1?'#f3f4f6':'#f9fafb',border:'1px solid '+(i===0?'#fbbf24':i===1?'#d1d5db':'#e5e7eb'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:medalCol,flexShrink:0}}>
              {i+1}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{b.adresse}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',fontSize:12,color:'var(--txt3)'}}>
                <span>Total {fmtK(b.totalpris||b.pris)} kr</span>
                <span>FK {fmt(b._effFk)}/mnd</span>
                {b._tg>0&&<span style={{color:'var(--rdk)'}}>TG {fmt(b._tg)} kr</span>}
                {b.stjerner>0&&<span>{'★'.repeat(b.stjerner)}</span>}
              </div>
              {b._snap&&husData&&<div style={{marginTop:6,display:'flex',gap:6,flexWrap:'wrap'}}>
                {[{n:b._snap.navn1,r:b._snap.rest1},{n:b._snap.navn2,r:b._snap.rest2}].filter(p=>p.n).map(p=>(
                  <span key={p.n} style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:999,background:p.r>=0?'var(--gbg)':'var(--rbg)',color:p.r>=0?'var(--gdk)':'var(--rdk)'}}>
                    {p.n}: {fmt(p.r)} kr/mnd
                  </span>
                ))}
              </div>}
            </div>
          </div>;
        })}
      </div>

      {/* Head-to-head comparison table */}
      {shown.length>=2&&<div className="card">
        <div className="card-title">Side om side</div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr>
                <th style={{textAlign:'left',padding:'6px 4px',color:'var(--txt3)',fontWeight:600,borderBottom:'1px solid var(--br)',width:110}}>Felt</th>
                {shown.map(b=>(
                  <th key={b.id} style={{textAlign:'right',padding:'6px 4px',color:'var(--txt)',fontWeight:700,borderBottom:'1px solid var(--br)',fontSize:11}}>
                    {b.adresse.split(',')[0].slice(0,20)}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[
                ['Prisantydning', b=>b.pris?fmtK(b.pris)+' kr':'-', b=>b.pris||0, 'lower'],
                ['Fellesgjeld',   b=>b.fellesgjeld?fmtK(b.fellesgjeld)+' kr':'0', b=>b.fellesgjeld||0, 'lower'],
                ['Totalpris',     b=>fmtK(b.totalpris||b.pris)+' kr', b=>b.totalpris||b.pris||0, 'lower'],
                ['FK / mnd',      b=>fmt(b.felleskost||0)+' kr', b=>b.felleskost||0, 'lower'],
                ['Inkl. spar.',   b=>b._inkSave>0?'-'+fmt(b._inkSave)+' kr':'-', b=>-b._inkSave, 'lower'],
                ['Eff. FK / mnd', b=>fmt(b._effFk)+' kr', b=>b._effFk, 'lower'],
                ['TG-feil est.',  b=>b._tg>0?fmt(b._tg)+' kr':'-', b=>b._tg, 'lower'],
                ['Teknisk score', b=>b._ts+'/100', b=>b._ts, 'higher'],
                ['Sjekk: OK',     b=>String(Object.values(b.checklist||{}).filter(v=>v==='ok').length), b=>Object.values(b.checklist||{}).filter(v=>v==='ok').length, 'higher'],
                ['Sjekk: Problem',b=>String(Object.values(b.checklist||{}).filter(v=>v==='bad').length), b=>Object.values(b.checklist||{}).filter(v=>v==='bad').length, 'lower'],
                ['Stjerner',      b=>'★'.repeat(b.stjerner||0)||'-', b=>b.stjerner||0, 'higher'],
              ].map(([label, fmt2, val, dir])=>{
                const vals=shown.map(b=>val(b));
                const best=dir==='lower'?Math.min(...vals.filter(v=>v>0||vals.every(v=>v===0))):Math.max(...vals);
                return <tr key={label}>
                  <td style={{padding:'6px 4px',color:'var(--txt3)',fontWeight:500,borderBottom:'1px solid var(--br)',whiteSpace:'nowrap'}}>{label}</td>
                  {shown.map((b,i)=>{
                    const v=val(b);
                    const isBest=vals.filter(x=>x>0).length>1&&v===best&&v>0;
                    return <td key={b.id} style={{textAlign:'right',padding:'6px 4px',borderBottom:'1px solid var(--br)',fontWeight:isBest?700:400,color:isBest?(dir==='lower'?'var(--gdk)':'var(--bdk)'):'var(--txt)'}}>
                      {fmt2(b)}
                    </td>;
                  })}
                </tr>;
              })}
              {/* Snapshot-based rows */}
              {shown.some(b=>b._snap)&&<>
                <tr><td colSpan={shown.length+1} style={{padding:'8px 4px 4px',fontSize:10,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.06em',borderBottom:'1px solid var(--br)'}}>Økonomieffekt (fra Boligkalk)</td></tr>
                <tr>
                  <td style={{padding:'6px 4px',color:'var(--txt3)',fontWeight:500,borderBottom:'1px solid var(--br)'}}>Lån / mnd</td>
                  {shown.map(b=><td key={b.id} style={{textAlign:'right',padding:'6px 4px',borderBottom:'1px solid var(--br)'}}>{b._snap?fmt(b._snap.mLaan)+' kr':'-'}</td>)}
                </tr>
                <tr>
                  <td style={{padding:'6px 4px',color:'var(--txt3)',fontWeight:500,borderBottom:'1px solid var(--br)'}}>{shown[0]?._snap?.navn1||'Person 1'} igjen</td>
                  {shown.map(b=>{const ok=b._snap&&b._snap.rest1>=0;return <td key={b.id} style={{textAlign:'right',padding:'6px 4px',fontWeight:700,color:b._snap?(ok?'var(--gdk)':'var(--rdk)'):'var(--txt3)',borderBottom:'1px solid var(--br)'}}>{b._snap?fmt(b._snap.rest1)+' kr':'-'}</td>;})}
                </tr>
                {shown.some(b=>b._snap?.navn2)&&<tr>
                  <td style={{padding:'6px 4px',color:'var(--txt3)',fontWeight:500,borderBottom:'1px solid var(--br)'}}>{shown[0]?._snap?.navn2||'Person 2'} igjen</td>
                  {shown.map(b=>{const ok=b._snap&&b._snap.rest2>=0;return <td key={b.id} style={{textAlign:'right',padding:'6px 4px',fontWeight:700,color:b._snap?.rest2!=null?(ok?'var(--gdk)':'var(--rdk)'):'var(--txt3)',borderBottom:'1px solid var(--br)'}}>{b._snap?.rest2!=null?fmt(b._snap.rest2)+' kr':'-'}</td>;})}
                </tr>}
              </>}
            </tbody>
          </table>
        </div>
        {!shown.some(b=>b._snap)&&<div style={{marginTop:12,fontSize:12,color:'var(--txt3)',background:'var(--bg2)',borderRadius:'var(--r)',padding:'10px 12px',border:'1px solid var(--br)'}}>
          Kjør Beregn + Lagre i Boligkalk for å se økonomieffekt per bolig
        </div>}
      </div>}

      {/* Inclusions comparison */}
      <div className="card">
        <div className="card-title">Inkludert i felleskostnader</div>
        {shown.map(b=>{
          const inkl=[b.inkl?.internett&&'Internett',b.inkl?.fyring&&'Fyring',b.inkl?.varmtvann&&'Varmtvann',...(b.andreInkl||[])].filter(Boolean);
          const saving=b._inkSave;
          return <div key={b.id} style={{paddingBottom:10,marginBottom:10,borderBottom:'1px solid var(--br)'}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>{b.adresse.split(',')[0]}</div>
            {inkl.length>0?<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:4}}>
              {inkl.map((l,i)=><span key={i} style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:999,background:'var(--gbg)',color:'var(--gdk)'}}>+{l}</span>)}
              <span style={{fontSize:11,color:'var(--gdk)',fontWeight:600,background:'var(--gbg)',padding:'2px 8px',borderRadius:999}}>~ -{fmt(saving)} kr/mnd</span>
            </div>:<div style={{fontSize:12,color:'var(--txt3)'}}>Ingenting inkludert</div>}
          </div>;
        })}
      </div>
    </>}
  </div>;
}

/* ─── BUDRUNDE TAB ─── */
function BudrundTab({boliger,husData}){
  const [sessions,setSessions]=useState(()=>load('budrunde-main')||[]);
  const [activeId,setActiveId]=useState(null);
  const [showNy,setShowNy]=useState(false);
  const [importId,setImportId]=useState('');
  const [showAddBud,setShowAddBud]=useState(false);
  const [budType,setBudType]=useState('eget');
  const [budBelop,setBudBelop]=useState('');
  const [budTid,setBudTid]=useState('');
  const [budNote,setBudNote]=useState('');
  const [budder,setBudder]=useState('');
  const pot=boliger.filter(b=>b.status==='potensiell');
  function save(s){setSessions(s);stor('budrunde-main',s);}
  function createSession(){
    const bolig=boliger.find(b=>b.id===Number(importId));if(!bolig)return;
    const s={id:Date.now(),boligId:bolig.id,adresse:bolig.adresse,pris:bolig.pris,fellesgjeld:bolig.fellesgjeld,totalpris:bolig.totalpris,felleskost:bolig.felleskost,omk:bolig.omk||{total:0},bud:[]};
    const u=[...sessions,s];save(u);setActiveId(s.id);setShowNy(false);setImportId('');
  }
  function addBud(){
    if(!budBelop)return;
    const bud={id:Date.now(),type:budType,belop:Number(budBelop),tid:budTid||new Date().toLocaleTimeString('nb-NO',{hour:'2-digit',minute:'2-digit'}),note:budNote,budder};
    const u=sessions.map(s=>s.id===activeId?{...s,bud:[...s.bud,bud]}:s);
    save(u);setShowAddBud(false);setBudBelop('');setBudTid('');setBudNote('');setBudder('');
  }
  // budgetCheck removed — user sets own max bid
  const active=sessions.find(s=>s.id===activeId);

  if(!active)return <div>
    <div className="sec" style={{marginBottom:20}}>
      <div><div className="sec-t">Budrunde 🔨</div><div className="sec-s">Registrer og følg budene</div></div>
      {pot.length>0&&<button className="btn-action" onClick={()=>setShowNy(true)}><i className="ti ti-plus"/> Ny runde</button>}
    </div>
    {sessions.length===0&&pot.length===0&&<div className="empty-s"><div className="icon">🔨</div><div className="title">Ingen budrunder ennå</div><div className="sub">Merk boliger som "Potensiell" i Visning-fanen for å starte en budrunde</div></div>}
    {sessions.length===0&&pot.length>0&&<div className="empty-s"><div className="icon">🏷️</div><div className="title">Klar til å by?</div><div className="sub">Trykk "+ Ny runde" for å starte en budrunde på en potensiell bolig</div></div>}
    {sessions.map(s=>{
      const egne=s.bud.filter(b=>b.type==='eget');const top=egne.length>0?Math.max(...egne.map(b=>b.belop)):null;

      return <div key={s.id} className="bcard" style={{cursor:'pointer'}} onClick={()=>setActiveId(s.id)}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{s.adresse}</div><div style={{fontSize:12,color:'var(--txt3)',marginTop:1}}>Prisantydning: {fmtK(s.pris)} kr</div></div>
          <button onClick={e=>{e.stopPropagation();save(sessions.filter(x=>x.id!==s.id));}} style={{padding:'5px 8px',border:'none',background:'transparent',color:'var(--rdk)',cursor:'pointer',font:'inherit',fontSize:14}}><i className="ti ti-trash"/></button>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
          {s.bud.filter(b=>b.type==='eget').length>0&&<span className="badge bb_">{s.bud.filter(b=>b.type==='eget').length} egne bud</span>}
          {s.bud.filter(b=>b.type==='konkurrent').length>0&&<span className="badge ba_">{s.bud.filter(b=>b.type==='konkurrent').length} konkurrentbud</span>}
          {top&&<span className="badge bb_">Topp: {fmtK(top)} kr</span>}
        </div>
        <div style={{fontSize:12,color:'var(--txt3)'}}>Trykk for å åpne →</div>
      </div>;
    })}
    {showNy&&<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowNy(false)}}>
      <div className="sheet"><div className="handle"/>
        <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>Ny budrunde</div>
        <div style={{fontSize:13,color:'var(--txt3)',marginBottom:16}}>Velg en potensiell bolig</div>
        {pot.map(b=>(
          <button key={b.id} onClick={()=>setImportId(String(b.id))} style={{display:'block',width:'100%',marginBottom:8,textAlign:'left',padding:'12px 14px',border:'1px solid '+(importId===String(b.id)?'var(--accent)':'var(--br2)'),borderRadius:'var(--r)',background:importId===String(b.id)?'var(--bbg)':'var(--bg2)',cursor:'pointer',font:'inherit',fontWeight:importId===String(b.id)?700:400,color:importId===String(b.id)?'var(--bdk)':'var(--txt)'}}>
            {b.adresse}<div style={{fontSize:12,marginTop:2,color:importId===String(b.id)?'var(--bdk)':'var(--txt3)'}}>Prisantydning: {fmtK(b.pris)} kr</div>
          </button>
        ))}
        <button className="btnpri" onClick={createSession} disabled={!importId}>Start budrunde</button>
      </div>
    </div>}
  </div>;

  const egneBud=active.bud.filter(b=>b.type==='eget').sort((a,b)=>b.id-a.id);
  const konkBud=active.bud.filter(b=>b.type==='konkurrent').sort((a,b)=>b.id-a.id);
  const topEget=egneBud.length>0?egneBud[0].belop:null;
  const topKonk=konkBud.length>0?Math.max(...konkBud.map(b=>b.belop)):null;

  const omk=active.omk||{total:0};
  const fgjeld=active.fellesgjeld||0;
  const totalBudMedAlt=(topEget||active.pris)+fgjeld+omk.total;
  const maxBud=active.maxBud||0;
  const maxBudTotal=maxBud?maxBud+fgjeld+omk.total:0;
  function updSession(fn){const u=sessions.map(s=>s.id===activeId?fn(s):s);save(u);}

  return <div>
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
      <button className="back-btn" onClick={()=>setActiveId(null)}><i className="ti ti-arrow-left"/></button>
      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:16,letterSpacing:'-.01em'}}>{active.adresse}</div><div style={{fontSize:12,color:'var(--txt3)',marginTop:1}}>Prisantydning: {fmtK(active.pris)} kr</div></div>
    </div>
    <div className="card">
      <div style={{marginBottom:10}}>
        <div style={{fontSize:24,fontWeight:700,letterSpacing:'-.02em'}}>{fmtK(topEget||active.pris)} kr</div>
        <div style={{fontSize:13,color:'var(--txt3)',marginTop:2}}>{topEget?'Ditt høyeste bud':'Prisantydning'}</div>
      </div>
      <div className="g3">
        {[['Bud',fmtK(topEget||active.pris)],['+ Gjeld',fmtK(fgjeld)],['+ Omk.',fmt(omk.total)]].map(([l,v])=>(
          <div key={l} className="stat"><div className="sl">{l}</div><div className="sv" style={{fontSize:14}}>{v} kr</div></div>
        ))}
      </div>
      <div style={{background:'var(--bg2)',borderRadius:'var(--r)',padding:'10px 14px',marginTop:4,border:'1px solid var(--br)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,color:'var(--txt2)',fontWeight:600}}>Total kjøpskostnad</span>
        <span style={{fontSize:17,fontWeight:700,color:'var(--accent)'}}>{fmtK(totalBudMedAlt)} kr</span>
      </div>
    </div>
    <div className="card" style={{marginBottom:14}}>
      <div className="card-title">🎯 Din budgrense</div>
      <div style={{fontSize:13,color:'var(--txt3)',marginBottom:10,lineHeight:1.5}}>Sett maks bud du er villig til å gi. FK og fellesgjeld fylles inn automatisk.</div>
      <div style={{marginBottom:10}}>
        <label style={{fontSize:12,fontWeight:600,color:'var(--txt3)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}}>Maks budbeløp (kr)</label>
        <input type="number" placeholder={String(active.pris||0)} value={maxBud||''} onChange={e=>updSession(s=>({...s,maxBud:Number(e.target.value)||0}))} style={{fontSize:16,fontWeight:600}}/>
      </div>
      {maxBud>0&&<div style={{background:'var(--bg2)',borderRadius:'var(--r)',padding:'10px 12px',border:'1px solid var(--br)'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          {[['Maks bud',fmtK(maxBud)+' kr'],['+ Gjeld',fmtK(maxBud+fgjeld)+' kr'],['+ Omk.',fmtK(maxBudTotal)+' kr']].map(([l,v])=>(
            <div key={l} style={{textAlign:'center'}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:2}}>{l}</div>
              <div style={{fontSize:13,fontWeight:700}}>{v}</div>
            </div>
          ))}
        </div>
        {topEget&&maxBud&&<div style={{marginTop:10,borderTop:'1px solid var(--br)',paddingTop:8}}>
          {topEget<maxBud*0.9&&<div style={{fontSize:13,color:'var(--gdk)',fontWeight:600}}>✅ God margin — {fmt(maxBud-topEget)} kr igjen til grensen</div>}
          {topEget>=maxBud*0.9&&topEget<maxBud&&<div style={{fontSize:13,color:'var(--amber)',fontWeight:600}}>⚠️ Nærmer seg grensen — kun {fmt(maxBud-topEget)} kr igjen</div>}
          {topEget>=maxBud&&<div style={{fontSize:13,color:'var(--rdk)',fontWeight:600}}>🛑 Høyeste bud ({fmtK(topEget)} kr) er over budgrensen!</div>}
        </div>}
      </div>}
    </div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:16}}>Budlogg</div>
      <button className="btn-action" onClick={()=>setShowAddBud(true)}><i className="ti ti-plus"/> Nytt bud</button>
    </div>
    {active.bud.length===0&&<div style={{textAlign:'center',padding:'1.5rem',color:'var(--txt3)',fontSize:14}}>Ingen bud registrert ennå</div>}
    {active.bud.length>0&&<div style={{display:'grid',gridTemplateColumns:'1fr 1px 1fr',gap:0,marginBottom:12}}>
      <div style={{paddingRight:8}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'var(--blue)',display:'inline-block'}}/>Dine bud ({egneBud.length})
        </div>
        {egneBud.map((b,i)=>(
          <div key={b.id} style={{background:i===0?'var(--bbg)':'var(--bg2)',borderRadius:'var(--r)',padding:'11px 12px',marginBottom:6,border:'1px solid '+(i===0?'rgba(37,99,235,.3)':'var(--br)')}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:15,fontWeight:700,color:i===0?'var(--bdk)':'var(--txt)'}}>{fmtK(b.belop)} kr</span>
              {i===0&&<span style={{fontSize:10,fontWeight:700,background:'var(--accent)',color:'#fff',padding:'2px 7px',borderRadius:999}}>HØYEST</span>}
            </div>
            <div style={{fontSize:11,color:'var(--txt3)',marginTop:3}}>{b.tid}{b.note&&' — '+b.note}</div>
          </div>
        ))}
        {egneBud.length===0&&<div style={{fontSize:12,color:'var(--txt3)',fontStyle:'italic',padding:'8px 0'}}>Ingen egne bud</div>}
      </div>
      <div style={{background:'var(--br)',width:1}}/>
      <div style={{paddingLeft:8}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'var(--amber)',display:'inline-block'}}/>Konkurrenter ({konkBud.length})
        </div>
        {konkBud.map((b,i)=>{const isTop=b.belop===topKonk&&i===0;return(
          <div key={b.id} style={{background:isTop?'var(--abg)':'var(--bg2)',borderRadius:'var(--r)',padding:'11px 12px',marginBottom:6,border:'1px solid '+(isTop?'rgba(217,119,6,.3)':'var(--br)')}}>
            <div style={{fontSize:15,fontWeight:700,color:isTop?'var(--adk)':'var(--txt)'}}>{fmtK(b.belop)} kr</div>
            <div style={{fontSize:11,color:'var(--txt3)',marginTop:3}}>{b.budder&&b.budder+' • '}{b.tid}{b.note&&' — '+b.note}</div>
          </div>
        );})}
        {konkBud.length===0&&<div style={{fontSize:12,color:'var(--txt3)',fontStyle:'italic',padding:'8px 0'}}>Ingen konkurrentbud</div>}
      </div>
    </div>}
    {egneBud.length>0&&husData&&<div className="card" style={{marginTop:4}}>
      <div className="card-title">📊 Økonomieffekt per bud</div>
      <div style={{fontSize:12,color:'var(--txt3)',marginBottom:12,lineHeight:1.5}}>Hva dere sitter igjen med per måned for hvert bud du har lagt inn (lån + FK + faste utgifter)</div>
      {egneBud.map((bud,i)=>{
        const budBase={...husData,kjopesum:bud.belop+(active.fellesgjeld||0)};
        const k=calcKalk(budBase);
        const persons=husData.toPerson?[{n:husData.navn1||'P1',r:k.p1},{n:husData.navn2||'P2',r:k.p2}]:[{n:husData.navn1||'P1',r:k.p1}];
        const isTop=i===0;
        return <div key={bud.id} style={{marginBottom:12,paddingBottom:12,borderBottom:'1px solid var(--br)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div>
              <span style={{fontWeight:700,fontSize:15,color:isTop?'var(--bdk)':'var(--txt)'}}>{fmtK(bud.belop)} kr</span>
              {isTop&&<span style={{marginLeft:8,fontSize:10,fontWeight:700,background:'var(--accent)',color:'#fff',padding:'2px 7px',borderRadius:999}}>HØYEST</span>}
            </div>
            <span style={{fontSize:12,color:'var(--txt3)'}}>{bud.tid}{bud.note&&' — '+bud.note}</span>
          </div>
          <div style={{fontSize:12,color:'var(--txt3)',marginBottom:8}}>Lån: {fmt(k.mLaan)} kr/mnd &nbsp;|&nbsp; Totalpris: {fmtK(bud.belop+(active.fellesgjeld||0)+(active.omk&&active.omk.total||0))} kr</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat('+persons.length+',1fr)',gap:8}}>
            {persons.map(p=>(
              <div key={p.n} className={'stat'+(p.r.rest>=0?' good':' bad')}>
                <div className="sl">{p.n} igjen</div>
                <div className="sv" style={{fontSize:15}}>{fmt(p.r.rest)} kr</div>
                {p.r.nettoBuf!==0&&<div style={{fontSize:10,color:'var(--txt3)',marginTop:2}}>Inkl. buf: {fmt(p.r.restMedBuf)} kr</div>}
              </div>
            ))}
          </div>
        </div>;
      })}
    </div>}
    {showAddBud&&<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowAddBud(false)}}>
      <div className="sheet"><div className="handle"/>
        <div style={{fontWeight:700,fontSize:18,marginBottom:16}}>Registrer bud</div>
        <div style={{display:'flex',gap:0,marginBottom:16,background:'var(--bg2)',padding:3,borderRadius:'var(--rl)',border:'1px solid var(--br)'}}>
          {[['eget','🙋 Mitt bud'],['konkurrent','👤 Konkurrent']].map(([v,l])=>(
            <button key={v} onClick={()=>setBudType(v)} style={{flex:1,padding:9,fontWeight:700,fontSize:13,border:'1px solid '+(budType===v?'var(--br2)':'transparent'),borderRadius:'var(--r)',background:budType===v?'var(--bg)':'transparent',cursor:'pointer',font:'inherit',color:budType===v?'var(--txt)':'var(--txt3)',boxShadow:budType===v?'var(--shadow)':'none'}}>
              {l}
            </button>
          ))}
        </div>
        {budType==='konkurrent'&&<div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--txt3)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}}>Budgiver (valgfritt)</label>
          <input placeholder="Navn eller ref." value={budder} onChange={e=>setBudder(e.target.value)}/>
        </div>}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--txt3)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}}>Budbeløp (kr)</label>
          <input type="number" placeholder={String(active.pris)} value={budBelop} onChange={e=>setBudBelop(e.target.value)} style={{fontSize:18,fontWeight:700}}/>
          {budType==='eget'&&budBelop&&<div style={{marginTop:6,fontSize:12,color:'var(--txt3)'}}>Total med gjeld og omk: <strong style={{color:'var(--txt)'}}>{fmtK(Number(budBelop)+fgjeld+omk.total)} kr</strong></div>}
        </div>
        {budType==='eget'&&budBelop&&maxBud>0&&(()=>{
          const belop=Number(budBelop);
          const over=belop>maxBud;
          const naer=belop>maxBud*0.9&&belop<=maxBud;
          return <div style={{background:over?'var(--rbg)':naer?'var(--abg)':'var(--gbg)',borderRadius:'var(--r)',padding:'11px 14px',marginBottom:14,border:'1px solid '+(over?'rgba(220,38,38,.25)':naer?'rgba(217,119,6,.25)':'rgba(5,150,105,.25)')}}>
            <div style={{fontSize:13,fontWeight:700,color:over?'var(--rdk)':naer?'var(--adk)':'var(--gdk)',marginBottom:2}}>
              {over?'🛑 Over din budgrense':naer?'⚠️ Nærmer seg grensen':'✅ Innenfor din budgrense'}
            </div>
            <div style={{fontSize:12,color:over?'var(--rdk)':naer?'var(--adk)':'var(--gdk)'}}>
              Grense: {fmtK(maxBud)} kr — {over?fmtK(belop-maxBud)+' kr over':fmtK(maxBud-belop)+' kr igjen'}
            </div>
          </div>;
        })()} 
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--txt3)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}}>Tidspunkt</label>
          <input type="time" value={budTid} onChange={e=>setBudTid(e.target.value)}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:700,color:'var(--txt3)',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}}>Notat (valgfritt)</label>
          <input placeholder="F.eks. med forbehold" value={budNote} onChange={e=>setBudNote(e.target.value)}/>
        </div>
        <button className="btnpri" onClick={addBud} disabled={!budBelop}>Lagre bud</button>
      </div>
    </div>}
  </div>;
}

/* ─── LANDING PAGE ─── */
function LandingPage({onForstatt,onEksempel}){
  const features=[
    {icon:'🏠',title:'Visningssjekkliste',desc:'Gå gjennom alle punkter på visning og få en strukturert vurdering av boligen'},
    {icon:'💰',title:'Boligkalkulator',desc:'Beregn hva dere faktisk har råd til og se hva som er igjen etter alle utgifter'},
    {icon:'📊',title:'Sammenligning',desc:'Sammenlign potensielle boliger side om side og få en rangering av beste kjøp'},
    {icon:'🔨',title:'Budrunde',desc:'Logg alle bud – dine egne og konkurrentenes – og sjekk om du er innenfor budsjett'},
    {icon:'🗺️',title:'Kart',desc:'Se alle boligene dine på kart og naviger direkte til Finn-annonsen'},

    {/* Header */}

      <button onClick={onForstatt} style={{padding:'8px 14px',border:'1px solid var(--br2)',borderRadius:'var(--r)',background:'transparent',color:'var(--txt3)',cursor:'pointer',font:'inherit',fontSize:13}}>
        <i className="ti ti-x"/> Hopp over

    </div>
    {/* Hero */}
    <div style={{padding:'32px 24px 24px',textAlign:'center'}}>
      <div style={{fontSize:52,marginBottom:16}}>🏡</div>
      <div style={{fontSize:28,fontWeight:800,letterSpacing:'-.03em',lineHeight:1.15,marginBottom:12}}>Din smarte<br/>boligkjøpsassistent</div>
      <div style={{fontSize:15,color:'var(--txt2)',lineHeight:1.6,maxWidth:320,margin:'0 auto'}}>
        Alt du trenger for å finne, vurdere og kjøpe bolig — samlet på ett sted.
      </div>
    </div>
    {/* Features */}
    <div style={{padding:'0 20px',flex:1}}>
      {features.map((f,i)=>(
        <div key={i} style={{display:'flex',alignItems:'flex-start',gap:14,padding:'14px 0',borderBottom:'1px solid var(--br)'}}>
          <div style={{fontSize:26,width:36,textAlign:'center',flexShrink:0,marginTop:1}}>{f.icon}</div>
          <div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:3,letterSpacing:'-.01em'}}>{f.title}</div>
            <div style={{fontSize:13,color:'var(--txt3)',lineHeight:1.5}}>{f.desc}</div>
          </div>
        </div>
      ))}
    </div>
    {/* How to use */}
    <div style={{padding:'24px 20px 16px'}}>
      <div style={{fontSize:13,fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:12}}>Slik bruker du appen</div>
      {[
        ['1','Legg til en bolig','Lim inn Finn-lenken og annonsetekst — appen finner pris og FK automatisk'],
        ['2','Gå gjennom sjekklisten','Vurder alle punkter på visning og legg inn TG-funn'],
        ['3','Beregn økonomien','Se hva dere sitter igjen med per måned for akkurat den boligen'],
        ['4','Sammenlign og by','Ranger boliger mot hverandre og logg budrunden'],
      ].map(([n,t,d])=>(
        <div key={n} style={{display:'flex',gap:12,marginBottom:12}}>
          <div style={{width:26,height:26,borderRadius:'50%',background:'var(--accent)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{n}</div>
          <div><div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{t}</div><div style={{fontSize:12,color:'var(--txt3)',lineHeight:1.4}}>{d}</div></div>
        </div>
      ))}
    </div>
    {/* CTA */}
    <div style={{padding:'16px 20px 40px',display:'flex',flexDirection:'column',gap:10}}>
      <button className="btnpri" onClick={onForstatt}>Forstått — kom i gang <i className="ti ti-arrow-right"/></button>
      <button onClick={onEksempel} style={{width:'100%',padding:13,border:'1px solid var(--br2)',borderRadius:'var(--r)',background:'var(--bg2)',cursor:'pointer',font:'inherit',fontSize:15,fontWeight:600,color:'var(--txt)'}}>
        <i className="ti ti-eye"/> Se eksempel
      </button>
    </div>
  </div>;
}

/* ─── BRUKEROPPSETT ─── */
function Brukeroppsett({onDone}){
  const [navn1,setNavn1]=useState('');
  const [toPerson,setToPerson]=useState(false);
  const [navn2,setNavn2]=useState('');
  const [steg,setSteg]=useState(1);
  function neste(){
    if(steg===1){if(!navn1.trim())return;setSteg(2);}
    else{onDone(navn1.trim(),toPerson?navn2.trim():null);}
  }
  return <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',justifyContent:'center',padding:'40px 24px'}}>
    <div style={{marginBottom:40}}>
      <div style={{fontSize:36,marginBottom:16}}>👋</div>
      {steg===1?<>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:'-.02em',marginBottom:8}}>Hva heter du?</div>
        <div style={{fontSize:14,color:'var(--txt3)',lineHeight:1.5,marginBottom:24}}>Vi bruker navnet ditt i kalkulatoren og sammenligningene.</div>
        <input placeholder="Ditt navn" value={navn1} onChange={e=>setNavn1(e.target.value)} onKeyDown={e=>e.key==='Enter'&&neste()} style={{fontSize:18,fontWeight:600,padding:'14px 16px',marginBottom:14}} autoFocus/>
      </>:<>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:'-.02em',marginBottom:8}}>Kjøper du med noen?</div>
        <div style={{fontSize:14,color:'var(--txt3)',lineHeight:1.5,marginBottom:24}}>Legg til en partner for å dele utgifter og se individuelle beregninger.</div>
        {!toPerson?<div>
          <button onClick={()=>setToPerson(true)} style={{width:'100%',padding:'14px 16px',border:'2px dashed var(--br2)',borderRadius:'var(--rl)',background:'transparent',cursor:'pointer',font:'inherit',fontSize:15,color:'var(--txt2)',fontWeight:600,marginBottom:10}}>
            <i className="ti ti-user-plus"/> Legg til partner
          </button>
        </div>:<div>
          <input placeholder="Partners navn" value={navn2} onChange={e=>setNavn2(e.target.value)} style={{fontSize:18,fontWeight:600,padding:'14px 16px',marginBottom:10}} autoFocus/>
          <button onClick={()=>setToPerson(false)} style={{width:'100%',padding:8,border:'none',background:'transparent',cursor:'pointer',font:'inherit',fontSize:13,color:'var(--txt3)'}}>Fjern partner</button>
        </div>}
      </>}
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      <button className="btnpri" onClick={neste} disabled={steg===1&&!navn1.trim()}>
        {steg===1?'Neste →':'Kom i gang →'}
      </button>
      {steg===2&&<button onClick={neste} style={{width:'100%',padding:12,border:'1px solid var(--br2)',borderRadius:'var(--r)',background:'transparent',cursor:'pointer',font:'inherit',fontSize:14,color:'var(--txt3)'}}>
        Kjøper alene — fortsett
      </button>}
    </div>
  </div>;
}

/* ─── APP ROOT ─── */
function App(){
  const [screen,setScreen]=useState(()=>{
    const seenLanding=localStorage.getItem('bolig-seen-landing');
    const setup=load('app-setup');
    if(seenLanding&&setup&&setup.done)return 'app';
    if(seenLanding&&setup&&setup.done)return 'app';
    return 'landing';
  });
  const [showEksempel,setShowEksempel]=useState(false);
  const [tab,setTab]=useState(0);
  const [husData,setHusData]=useState(()=>{
    const setup=load('app-setup');
    if(setup&&setup.done)return load('hushold-main')||makeDefaultHus(setup.navn1,setup.navn2);
    return null;
  });
  const [boliger,setBoliger]=useState(()=>load('boliger-main')||[]);
  const [bkData,setBkData]=useState(()=>{const s=load('boligkalk-main');return s?s.data:null;});
  const [bkNavn,setBkNavn]=useState(()=>{const s=load('boligkalk-main');return s?s.navn:null;});
  const [bkBoligId,setBkBoligId]=useState(()=>{const s=load('boligkalk-main');return s?s.boligId:null;});
  const [bkInkl,setBkInkl]=useState(()=>{const s=load('boligkalk-main');return s?s.inkl||{}:{};});
  const [snapshots,setSnapshots]=useState(()=>load('snapshots-main')||[]);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('app-apikey')||'');
  const [showSettings,setShowSettings]=useState(false);

  function handleSetup(navn1,navn2){
    const hus=makeDefaultHus(navn1,navn2||null);
    if(!navn2)hus.toPerson=false;
    setHusData(hus);
    stor('hushold-main',hus);
    stor('app-setup',{done:true,navn1,navn2:navn2||null});
    localStorage.setItem('bolig-seen-landing','1');
    setScreen('app');
  }

  function saveHus(d){setHusData(d);stor('hushold-main',d);}

  function sendToKalk(b){
    const base=JSON.parse(JSON.stringify(husData));
    const tp=(b.pris||0)+(b.fellesgjeld||0);
    base.kjopesum=tp||b.pris||husData.kjopesum;
    base.felles={...husData.felles,felleskost:b.felleskost||husData.felles.felleskost};
    const inkl={};
    if(b.inkl&&b.inkl.internett)inkl.internett=true;
    if(b.inkl&&(b.inkl.fyring||b.inkl.varmtvann))inkl.strom=true;
    setBkData(base);setBkNavn(b.adresse);setBkBoligId(b.id);setBkInkl(inkl);
    stor('boligkalk-main',{data:base,navn:b.adresse,boligId:b.id,inkl});
    setTab(1);
  }

  function saveSnapshot(){
    if(!bkData||!bkBoligId)return;
    const k=calcKalk(bkData);
    const totalUt=(k.p1.totalUt||0)+(bkData.toPerson?(k.p2.totalUt||0):0);
    const snap={boligId:bkBoligId,navn1:bkData.navn1||'Person 1',navn2:bkData.toPerson?(bkData.navn2||'Person 2'):null,rest1:k.p1.rest,rest2:bkData.toPerson?k.p2.rest:null,mLaan:k.mLaan,totalUt,savedAt:Date.now()};
    const upd=[...snapshots.filter(s=>s.boligId!==bkBoligId),snap];
    setSnapshots(upd);stor('snapshots-main',upd);
  }

  function clearBk(){setBkData(null);setBkNavn(null);setBkBoligId(null);setBkInkl({});localStorage.removeItem('boligkalk-main');}

  const kData=tab===2?(bkData?{...husData,...bkData}:husData):husData;
  const setKData=tab===2?d=>{setBkData(d);stor('boligkalk-main',{data:d,navn:bkNavn,boligId:bkBoligId,inkl:bkInkl});}:saveHus;
  const hasSaved=!!(bkBoligId&&snapshots.some(s=>s.boligId===bkBoligId));

  if(screen==='landing')return <>
    {showEksempel?<EksempelDemo onClose={()=>{setShowEksempel(false);localStorage.setItem('bolig-seen-landing','1');setScreen('setup');}}/>
      :<LandingPage onForstatt={()=>setScreen('setup')} onEksempel={()=>setShowEksempel(true)}/>}
  </>;
  if(screen==='setup')return <Brukeroppsett onDone={handleSetup}/>;
  if(!husData)return <Brukeroppsett onDone={handleSetup}/>;

  return <div>
    <div className="tab-bar">
      {[{i:'ti-home-2',l:'Visning'},{i:'ti-building-estate',l:'Boligkalk'},{i:'ti-scale',l:'Sammenlign'},{i:'ti-gavel',l:'Budrunde'}].map((t,idx)=>(
        <button key={idx} className={'tab-btn'+(tab===idx?' active':'')} onClick={()=>setTab(idx)}>
          <i className={'ti '+t.i} style={{display:'block',fontSize:18,marginBottom:2}}/>
          {t.l}
        </button>
      ))}
      <button className="tab-btn" onClick={()=>setShowSettings(true)} style={{maxWidth:40}}>
        <i className="ti ti-settings" style={{display:'block',fontSize:18,marginBottom:2}}/>
      </button>
    </div>
    <div className="page">
      {tab===0&&<VisningTab boliger={boliger} setBoliger={setBoliger} onSendToKalk={sendToKalk} snapshots={snapshots} apiKey={apiKey}/>}
      {tab===1&&<KalkulatorTab data={kData} setData={setKData} boligInkl={bkInkl} boligNavn={bkNavn} onClearBolig={clearBk} onSaveSnapshot={saveSnapshot} hasSaved={hasSaved}/>}
      {tab===2&&<SammenligningTab boliger={boliger} snapshots={snapshots} husData={husData}/>}
      {tab===3&&<BudrundTab boliger={boliger} husData={husData}/>}
    </div>
    {showSettings&&<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowSettings(false)}}>
      <div className="sheet"><div className="handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:18}}>⚙️ Innstillinger</div>
          <button onClick={()=>setShowSettings(false)} style={{padding:'5px 9px',border:'1px solid var(--br2)',borderRadius:'var(--r)',cursor:'pointer',font:'inherit',background:'var(--bg2)'}}><i className="ti ti-x"/></button>
        </div>
        <div className="card">
          <div className="card-title">Brukere</div>
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            <div style={{flex:1}}>
              <label style={{fontSize:12,fontWeight:600,color:'var(--txt3)',display:'block',marginBottom:4}}>Person 1</label>
              <input value={husData.navn1||''} onChange={e=>{const d={...husData,navn1:e.target.value};saveHus(d);}}/>
            </div>
            {husData.toPerson&&<div style={{flex:1}}>
              <label style={{fontSize:12,fontWeight:600,color:'var(--txt3)',display:'block',marginBottom:4}}>Person 2</label>
              <input value={husData.navn2||''} onChange={e=>{const d={...husData,navn2:e.target.value};saveHus(d);}}/>
            </div>}
          </div>
          {!husData.toPerson&&<button onClick={()=>{const d={...husData,toPerson:true,navn2:'Person 2'};saveHus(d);}} style={{width:'100%',padding:9,border:'1px dashed var(--br2)',borderRadius:'var(--r)',background:'transparent',cursor:'pointer',font:'inherit',fontSize:13,color:'var(--txt2)',fontWeight:500}}>
            + Legg til person 2
          </button>}
        </div>
        <div className="card">
          <div className="card-title">API-nøkkel (valgfritt)</div>
          <div style={{fontSize:13,color:'var(--txt3)',marginBottom:10,lineHeight:1.5}}>Brukes kun for PDF-analyse av salgsoppgaver og AI-oppsummeringer. Tekst-parsing fungerer uten.</div>
          <input type="password" placeholder="sk-ant-api03-..." value={apiKey} onChange={e=>{setApiKey(e.target.value);localStorage.setItem('app-apikey',e.target.value);}}/>
          <div style={{fontSize:12,marginTop:6,color:apiKey?'var(--gdk)':'var(--txt3)'}}>{apiKey?'✅ Nøkkel er satt ('+apiKey.length+' tegn)':'Ingen nøkkel satt'}</div>
        </div>
        <button onClick={()=>{if(confirm('Nullstille alt? All data slettes.')){localStorage.clear();window.location.reload();}}} style={{width:'100%',padding:10,border:'1px solid rgba(220,38,38,.3)',borderRadius:'var(--r)',background:'var(--rbg)',color:'var(--rdk)',cursor:'pointer',font:'inherit',fontWeight:600,marginTop:8}}>
          🗑️ Nullstill all data
        </button>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/boligapp/sw.js",{scope:"/boligapp/"})
      .then(r=>console.log("SW ok"))
      .catch(e=>console.log("SW err",e));
  });
}
</script>
</body>
